---
name: Build and Publish Book

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}  # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: modern-it-infra-v${{ github.run_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-fonts-recommended texlive-lang-chinese fonts-noto-cjk fonts-dejavu
          sudo apt-get install -y pandoc make

      - name: Build all documents
        run: make all

      - name: List generated files
        run: |
          echo "=== Generated PDFs ==="
          find output -name "*.pdf" 2>/dev/null | head -20
          echo ""
          echo "=== Generated DOCX ==="
          find output -name "*.docx" 2>/dev/null | head -20
          echo ""
          echo "=== Generated HTML ==="
          find output -name "*.html" 2>/dev/null | head -20

      - name: Upload all artifacts to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: book-artifacts
          path: |
            output/**/*.pdf
            output/**/*.docx
            output/**/*.html

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            output/**/*.pdf
            output/**/*.docx
            output/**/*.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: book-artifacts
          path: output

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'output'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
